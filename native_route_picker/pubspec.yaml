name: native_route_picker
description: "Native audio output route picker — AVRoutePickerView (AirPlay) on iOS/macOS, system output switcher on Android."
version: 0.0.1
publish_to: "none"

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: NativeRoutePickerPlugin
      macos:
        pluginClass: NativeRoutePickerPlugin
      android:
        package: com.example.native_route_picker
        pluginClass: NativeRoutePickerPlugin
