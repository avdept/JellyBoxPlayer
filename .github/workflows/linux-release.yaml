name: Linux Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libmpv-dev mpv \
            libsecret-1-dev libjsoncpp-dev \
            libsqlite3-dev \
            libcurl4-openssl-dev

      - name: Build Linux bundle
        run: |
          flutter pub get
          flutter build linux --release

      - name: Create archive
        run: |
          cd build/linux/x64/release/bundle
          tar czf "$GITHUB_WORKSPACE/jellybox-linux-x64.tar.gz" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellybox-linux-x64
          path: jellybox-linux-x64.tar.gz

      - name: Upload to release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-linux
          name: Linux Build ${{ github.run_number }}
          files: jellybox-linux-x64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
